# Netlify deploy config for the Almenara frontend (monorepo: app lives in /frontend).
[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — let React Router handle all client routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Baseline security headers for the static app.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
